apiVersion: networking.serving.volcano.sh/v1alpha1
kind: ModelRoute
metadata:
  name: deepseek-sticky-precedence
  namespace: default
spec:
  modelName: "deepseek-sticky-precedence"
  sessionSticky:
    sessionAffinitySeconds: 300
    sources:
      - type: Header
        name: X-Sticky-Session
      - type: Query
        name: sticky_q
  rules:
  - name: "default"
    targetModels:
    - modelServerName: "deepseek-r1-1-5b"
