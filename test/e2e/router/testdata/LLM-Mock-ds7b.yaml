# DS7B mock backend for router e2e tests.
# Uses llm-d-inference-sim (SimpleTokenizer) with a non-HF internal model name.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepseek-r1-7b
spec:
  replicas: 3
  selector:
    matchLabels:
      app: deepseek-r1-7b
  template:
    metadata:
      labels:
        app: deepseek-r1-7b
    spec:
      containers:
        - name: llm-engine
          image: ghcr.io/llm-d/llm-d-inference-sim:latest
          imagePullPolicy: IfNotPresent
          args:
            - --model=kthena-mock-7b
            - --served-model-name=deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
            - --port=8000
            - --mode=echo
            - --time-to-first-token=0
            - --inter-token-latency=0
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 2
