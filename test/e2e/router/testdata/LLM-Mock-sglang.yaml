# SGLang metrics mock deployment for kthena runtime verification.
# Exposes Prometheus metrics at :30000/metrics compatible with sglang metrics format.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-mock
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sglang-mock
  template:
    metadata:
      labels:
        app: sglang-mock
    spec:
      containers:
        - name: llm-engine
          image: ghcr.io/faust-benchou/sglang-inference-sim:0.1.1
          imagePullPolicy: IfNotPresent
          args:
            - --model=kthena-mock-sglang
            - --served-model-name=Qwen/Qwen3-8B
            - --port=30000
            - --mode=echo
            - --time-to-first-token=0ms
            - --inter-token-latency=0ms
          ports:
            - containerPort: 30000
          readinessProbe:
            httpGet:
              path: /health
              port: 30000
            initialDelaySeconds: 2
            periodSeconds: 2
