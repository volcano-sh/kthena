apiVersion: networking.serving.volcano.sh/v1alpha1
kind: ModelServer
metadata:
  name: deepseek-r1-1-5b-sglang-pd-disaggregation
  namespace: default
spec:
  workloadSelector:
    matchLabels:
      modelserving.volcano.sh/name: deepseek-r1-1-5b-sglang-pd
    pdGroup:
      groupKey: "modelserving.volcano.sh/group-name"
      prefillLabels:
        modelserving.volcano.sh/role: "prefill"
      decodeLabels:
        modelserving.volcano.sh/role: "decode"
  workloadPort:
    port: 30000
  model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
  inferenceEngine: "SGLang"
  trafficPolicy:
    timeout: 10s
