apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-provider-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-provider-mock
  template:
    metadata:
      labels:
        app: external-provider-mock
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: external-provider-mock
          image: ghcr.io/volcano-sh/kthena-external-provider-mock:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: provider
              containerPort: 8443
            - name: admin
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 1
            periodSeconds: 1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
