apiVersion: networking.serving.volcano.sh/v1alpha1
kind: ModelRoute
metadata:
  name: deepseek-sticky-cookie
  namespace: default
spec:
  modelName: "deepseek-sticky-cookie"
  sessionSticky:
    sessionAffinitySeconds: 300
    sources:
      - type: Cookie
        name: sticky_sid
  rules:
  - name: "default"
    targetModels:
    - modelServerName: "deepseek-r1-1-5b"
