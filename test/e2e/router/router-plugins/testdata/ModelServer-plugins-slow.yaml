apiVersion: networking.serving.volcano.sh/v1alpha1
kind: ModelServer
metadata:
  name: router-plugin-mock-slow
  namespace: default
spec:
  workloadSelector:
    matchLabels:
      app: router-plugin-mock-slow
  workloadPort:
    port: 8000
  model: "router-plugin-model"
  inferenceEngine: "vLLM"
  trafficPolicy:
    timeout: 10s
