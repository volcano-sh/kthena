# Mock vLLM backends for router scheduler plugin e2e tests.
# Includes sim native ZMQ + zmq-bridge + runtime for kvcache-aware full-chain tests.
# ConfigMap router-plugin-mock-bridge (from scripts/zmq-bridge.py) is created by SetupPluginComponents.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-plugin-mock
spec:
  replicas: 3
  selector:
    matchLabels:
      app: router-plugin-mock
  template:
    metadata:
      labels:
        app: router-plugin-mock
        router-plugin-pool: latency
    spec:
      volumes:
        - name: bridge-script
          configMap:
            name: router-plugin-mock-bridge
      containers:
        - name: zmq-bridge
          image: ghcr.io/volcano-sh/runtime:latest
          imagePullPolicy: IfNotPresent
          command: ["python3", "/config/zmq-bridge.py"]
          env:
            - name: SIM_SUB_BIND
              value: "tcp://127.0.0.1:5556"
            - name: RUNTIME_PUB_BIND
              value: "tcp://127.0.0.1:5557"
          volumeMounts:
            - name: bridge-script
              mountPath: /config
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - import socket; s=socket.create_connection(('127.0.0.1',5557),1); s.close()
            initialDelaySeconds: 2
            periodSeconds: 2
        - name: llm-engine
          image: ghcr.io/llm-d/llm-d-inference-sim:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          args:
            - --model=kthena-plugin-mock
            - --served-model-name=router-plugin-model
            - --port=8000
            - --mode=echo
            - --enable-kvcache=true
            - --force-dummy-tokenizer=true
            - --kv-cache-size=8
            - --block-size=8
            - --max-num-seqs=2
            - --time-to-first-token=20ms
            - --inter-token-latency=5ms
            - --zmq-endpoint=tcp://127.0.0.1:5556
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 2
        - name: runtime
          image: ghcr.io/volcano-sh/runtime:latest
          imagePullPolicy: IfNotPresent
          args:
            - --port
            - "8900"
            - --engine
            - vllm
            - --engine-base-url
            - http://127.0.0.1:8000
            - --engine-metrics-path
            - /metrics
            - --pod
            - $(POD_NAME).$(NAMESPACE)
            - --model
            - router-plugin-model
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: VLLM_USE_V1
              value: "1"
            - name: VLLM_ZMQ_ENDPOINT
              value: "tcp://127.0.0.1:5557"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: router-plugin-mock-runtime-env
                  key: REDIS_HOST
            - name: REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 8900
          readinessProbe:
            httpGet:
              path: /health
              port: 8900
            initialDelaySeconds: 5
            periodSeconds: 5
