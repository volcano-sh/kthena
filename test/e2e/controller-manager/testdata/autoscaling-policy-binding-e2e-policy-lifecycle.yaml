# Binds autoscale-policy-lifecycle-pol to autoscale-policy-lifecycle-ms.

apiVersion: workload.serving.volcano.sh/v1alpha1
kind: AutoscalingPolicyBinding
metadata:
  name: autoscale-policy-lifecycle-bind
spec:
  policyRef:
    name: autoscale-policy-lifecycle-pol
  homogeneousTarget:
    minReplicas: 1
    maxReplicas: 5
    target:
      targetRef:
        kind: ModelServing
        name: autoscale-policy-lifecycle-ms
      metricSources:
        sglang:kv_available_tokens:
          type: Pod
          pod:
            name: sglang:kv_available_tokens
            port: 30000
            uri: /metrics
