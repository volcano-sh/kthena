# ModelServing for controller-manager autoscale e2e (binding lifecycle).
# Same mocker/kv_available_tokens assumptions as model-serving-sglang-mocker-policy-lifecycle.yaml.

apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelServing
metadata:
  name: autoscale-binding-lifecycle-ms
spec:
  replicas: 5
  rolloutStrategy:
    type: ServingGroupRollingUpdate
    rollingUpdateConfiguration:
      maxUnavailable: 2
  template:
    roles:
      - name: prefill
        replicas: 1
        entryTemplate:
          spec:
            containers:
              - name: leader
                image: ghcr.io/faust-benchou/sglang-inference-sim:0.1.1
                imagePullPolicy: IfNotPresent
                args:
                  - --model=kthena-mock-sglang
                  - --served-model-name=Qwen/Qwen3-8B
                  - --port=30000
                  - --mode=echo
                  - --time-to-first-token=0ms
                  - --inter-token-latency=0ms
                ports:
                  - name: metrics
                    containerPort: 30000
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 30000
                  initialDelaySeconds: 2
                  periodSeconds: 2
        workerReplicas: 0
