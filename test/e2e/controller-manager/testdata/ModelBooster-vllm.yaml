apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelBooster
metadata:
  name: test-model
spec:
  name: test-model
  backend:
    name: backend1
    type: vLLM
    modelURI: hf://Qwen/Qwen2.5-0.5B-Instruct
    cacheURI: hostpath:///tmp/cache
    replicas: 1
    workers:
    - type: server
      # Pinned to a non-"latest" tag so Kubernetes defaults imagePullPolicy to
      # IfNotPresent, matching what test/e2e/setup.sh preloads into Kind.
      image: ghcr.io/huntersman/vllm-cpu-env:main
      replicas: 1
      pods: 1
      config:
        served-model-name: "test-model"
        max-model-len: 32768
        max-num-batched-tokens: 65536
        block-size: 128
        enable-prefix-caching: ""
      resources:
        requests:
          cpu: 2
          memory: 4Gi
        limits:
          cpu: 4
          memory: 16Gi
