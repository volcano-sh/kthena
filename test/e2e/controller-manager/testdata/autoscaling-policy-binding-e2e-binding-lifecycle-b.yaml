apiVersion: workload.serving.volcano.sh/v1alpha1
kind: AutoscalingPolicyBinding
metadata:
  name: autoscale-binding-lifecycle-b
spec:
  policyRef:
    name: autoscale-binding-lifecycle-pol
  homogeneousTarget:
    minReplicas: 1
    maxReplicas: 5
    target:
      targetRef:
        kind: ModelServing
        name: autoscale-binding-lifecycle-ms
      metricSources:
        sglang:kv_available_tokens:
          type: Pod
          pod:
            name: sglang:kv_available_tokens
            port: 30000
            uri: /metrics

