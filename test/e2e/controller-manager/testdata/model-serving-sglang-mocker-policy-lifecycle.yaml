# ModelServing for controller-manager autoscale e2e (policy lifecycle).
# SGLang-format Prometheus metrics on :30000/metrics (sglang-inference-sim).
# Autoscale tests use sglang:kv_available_tokens, a stable non-zero gauge (KV cache free slots)
# that is emitted per entry pod regardless of traffic, so after scale-down to one entry pod the
# aggregate sum / 0.1 >= 5 and maxReplicas can be reached (target "100m"). token_usage is unsuitable
# here because the mock reports it as 0 while idle.

apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelServing
metadata:
  name: autoscale-policy-lifecycle-ms
spec:
  replicas: 4
  rolloutStrategy:
    type: ServingGroupRollingUpdate
    rollingUpdateConfiguration:
      maxUnavailable: 2
  template:
    roles:
      - name: prefill
        replicas: 1
        entryTemplate:
          spec:
            containers:
              - name: leader
                image: ghcr.io/faust-benchou/sglang-inference-sim:0.1.1
                imagePullPolicy: IfNotPresent
                args:
                  - --model=kthena-mock-sglang
                  - --served-model-name=Qwen/Qwen3-8B
                  - --port=30000
                  - --mode=echo
                  - --time-to-first-token=0ms
                  - --inter-token-latency=0ms
                ports:
                  - name: metrics
                    containerPort: 30000
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 30000
                  initialDelaySeconds: 2
                  periodSeconds: 2
        workerReplicas: 0
