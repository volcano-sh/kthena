# AutoscalingPolicy for policy lifecycle e2e. Very large targetValue makes desired replicas 1
# (metric_collector sums sglang:kv_available_tokens across entry pods; see model-serving fixture comment).
# Scale-up phase: policy Update in autoscaling_test.go sets small target (100m).

apiVersion: workload.serving.volcano.sh/v1alpha1
kind: AutoscalingPolicy
metadata:
  name: autoscale-policy-lifecycle-pol
spec:
  tolerancePercent: 50
  metrics:
    - name: sglang:kv_available_tokens
      targetValue: "1000000000000000"
  homogeneousTarget:
    minReplicas: 1
    maxReplicas: 5
    target:
      targetRef:
        kind: ModelServing
        name: autoscale-policy-lifecycle-ms
      metricSources:
        sglang:kv_available_tokens:
          pod:
            name: sglang:kv_available_tokens
            port: 30000
            uri: /metrics
  behavior:
    scaleDown:
      period: 5s
      stabilizationWindow: 0s
      instances: 10
      percent: 100
      selectPolicy: Or
    scaleUp:
      stablePolicy:
        period: 5s
        stabilizationWindow: 0s
        instances: 10
        percent: 100
        selectPolicy: Or
      panicPolicy:
        period: 1s
        percent: 1000
        panicThresholdPercent: 200
        panicModeHold: 0s
