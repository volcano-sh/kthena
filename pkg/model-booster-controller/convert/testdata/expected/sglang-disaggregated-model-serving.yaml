            - --enable-metrics
            - --disaggregation-mode
            - decode
            - --disaggregation-transfer-backend
            - mooncake
            - --mem-fraction-static
            - "0.85"
            - --served-model-name
            - Qwen3-0.6B
            env:
            - name: POD_NAME
