apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelServing
metadata:
  labels:
    workload.serving.volcano.sh/backend-name: backend1
    workload.serving.volcano.sh/managed-by: workload.serving.volcano.sh
    workload.serving.volcano.sh/model-name: sglang-test
    workload.serving.volcano.sh/model-uid: sglang-uid
    workload.serving.volcano.sh/revision: 7546df7bc8
  name: sglang-test-backend1
  namespace: default
  ownerReferences:
  - apiVersion: workload.serving.volcano.sh/v1alpha1
    kind: ModelBooster
    name: sglang-test
    uid: sglang-uid
spec:
  replicas: 1
  schedulerName: ""
  template:
    gangPolicy:
      minRoleReplicas:
        leader: 1
    restartGracePeriodSeconds: 60
    roles:
    - entryTemplate:
        metadata:
          labels:
            workload.serving.volcano.sh/backend-name: backend1
            workload.serving.volcano.sh/managed-by: workload.serving.volcano.sh
            workload.serving.volcano.sh/model-name: sglang-test
            workload.serving.volcano.sh/model-uid: sglang-uid
            workload.serving.volcano.sh/revision: 7546df7bc8
        spec:
          containers:
          - args:
            - --port
            - "8100"
            - --engine
            - sglang
            - --engine-base-url
            - http://localhost:30000
            - --engine-metrics-path
            - /metrics
            - --pod
            - $(POD_NAME).$(NAMESPACE)
            - --model
            - sglang-test
            env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  key: REDIS_HOST
                  name: redis-config
                  optional: true
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  key: REDIS_PORT
                  name: redis-config
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: REDIS_PASSWORD
                  name: redis-secret
                  optional: true
            image: kthena/runtime:latest
            name: runtime
            ports:
            - containerPort: 8100
            readinessProbe:
              httpGet:
                path: /health
                port: 8100
              initialDelaySeconds: 5
              periodSeconds: 10
            resources: {}
          - command:
            - python3
            - -m
            - sglang.launch_server
            - --model-path
            - /tmp/test/4005c13ab5d91cb094e41048356abe39
            - --host
            - 0.0.0.0
            - --port
            - "30000"
            - --enable-metrics
            - --mem-fraction-static
            - "0.85"
            - --served-model-name
            - Qwen3-0.6B
            env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  key: REDIS_HOST
                  name: redis-config
                  optional: true
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  key: REDIS_PORT
                  name: redis-config
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: REDIS_PASSWORD
                  name: redis-secret
                  optional: true
            image: docker.io/lmsysorg/sglang:latest
            lifecycle:
              preStop:
                exec:
                  command:
                  - /bin/sh
                  - -c
                  - |
                    # Drain in-flight requests, bounded so it cannot exceed terminationGracePeriodSeconds.
                    i=0
                    while [ $i -lt 60 ]; do
                      METRICS=$(curl -sf http://localhost:30000/metrics 2>/dev/null) || {
                        echo "Terminating: metrics endpoint unreachable, engine already stopping" >> /proc/1/fd/1
                        exit 0
                      }
                      PENDING=$(echo "$METRICS" | awk '/^sglang:num_running_reqs/ || /^sglang:num_queue_reqs/ {s+=$2} END {printf "%d", s+0}')
                      if [ "$PENDING" -le 0 ]; then
                        echo "Terminating: drained, no active or waiting requests" >> /proc/1/fd/1
                        exit 0
                      fi
                      echo "Terminating: $PENDING in-flight requests, waiting" >> /proc/1/fd/1
                      i=$((i+1))
                      sleep 5
                    done
                    echo "Terminating: drain deadline reached, proceeding" >> /proc/1/fd/1
            livenessProbe:
              failureThreshold: 3
              httpGet:
                path: /health
                port: 30000
              initialDelaySeconds: 300
              periodSeconds: 15
            name: engine
            ports:
            - containerPort: 30000
            readinessProbe:
              failureThreshold: 3
              httpGet:
                path: /health
                port: 30000
              initialDelaySeconds: 180
              periodSeconds: 5
            resources:
              limits:
                cpu: "4"
                memory: 12Gi
                nvidia.com/gpu: "1"
            volumeMounts:
            - mountPath: /tmp/test
              name: backend1-weights
            - mountPath: /dev/shm
              name: dshm
          initContainers:
          - args:
            - --source
            - hf://Qwen/Qwen3-0.6B
            - --output-dir
            - /tmp/test/4005c13ab5d91cb094e41048356abe39
            image: kthena/downloader:latest
            name: sglang-test-model-downloader
            resources: {}
            volumeMounts:
            - mountPath: /tmp/test
              name: backend1-weights
          terminationGracePeriodSeconds: 300
          volumes:
          - hostPath:
              path: /tmp/test
              type: DirectoryOrCreate
            name: backend1-weights
          - emptyDir:
              medium: Memory
            name: dshm
      name: leader
      replicas: 1
      workerReplicas: 0
      workerTemplate:
        spec:
          containers: []
status: {}
