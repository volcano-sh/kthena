---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
spec:
  group: workload.serving.volcano.sh
  names:
    kind: ModelServing
    listKind: ModelServingList
    plural: modelservings
    singular: modelserving
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModelServing is the Schema for the LLM Serving API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ModelServingSpec defines the specification of the ModelServing
              resource.
            properties:
              plugins:
                description: Plugins defines optional plugin chain to customize serving
                  pods.
                items:
                  description: PluginSpec declares a plugin instance attached to a
                    ModelServing.
                  properties:
                    config:
                      description: Config is an opaque JSON blob interpreted by the
                        plugin implementation.
                      x-kubernetes-preserve-unknown-fields: true
                    name:
                      description: Name uniquely identifies the plugin instance within
                        the ModelServing.
                      type: string
                    scope:
                      description: |-
                        Scope optionally narrows where this plugin runs.
                        By default, it runs on all pods.
                      properties:
                        roles:
                          description: Roles limits the plugin to the specified role
                            names.
                          items:
                            type: string
                          type: array
                        target:
                          description: |-
                            Target limits the plugin to specific pod target (Entry/Worker/All).
                            kubebuilder:default=All
                            kubebuilder:validation:Enum={All,Entry,Worker}
                          type: string
                      type: object
                    type:
                      default: BuiltIn
                      description: Type indicates plugin category. For now, only BuiltIn
                        is supported.
                      enum:
                      - BuiltIn
                      type: string
                  required:
                  - name
                  - type
                  type: object
                type: array
              recoveryPolicy:
                default: RoleRecreate
                description: RecoveryPolicy defines the recovery policy for the failed
                  Pod to be rebuilt
                enum:
                - ServingGroupRecreate
                - RoleRecreate
                - None
                type: string
              replicas:
                default: 1
                description: |-
                  Number of ServingGroups. That is the number of instances that run serving tasks
                  Default to 1.
                format: int32
                type: integer
              rolloutStrategy:
                description: RolloutStrategy defines the strategy that will be applied
                  to update replicas
                properties:
                  rollingUpdateConfiguration:
                    description: |-
                      RollingUpdateConfiguration defines the parameters to be used when type is RollingUpdateStrategyType.
                      optional
                    properties:
                      maxUnavailable:
                        anyOf:
                        - type: integer
                        - type: string
                        default: 1
                        description: |-
                          The maximum number of replicas that can be unavailable during the update.
                          Value can be an absolute number (ex: 5) or a percentage of total replicas at the start of update (ex: 10%).
                          Absolute number is calculated from percentage by rounding down.
                          This can not be 0.
                          By default, a fixed value of 1 is used.
                        x-kubernetes-int-or-string: true
                      partition:
                        description: |-
                          Partition indicates the ordinal at which the ModelServing should be partitioned
                          for updates. During a rolling update, all ServingGroups from ordinal Replicas-1 to
                          Partition are updated. All ServingGroups from ordinal Partition-1 to 0 remain untouched.
                          The default value is 0.
                        format: int32
                        type: integer
                    type: object
                  type:
                    default: ServingGroupRollingUpdate
                    description: Type defines the rollout strategy, it can only be
                      “ServingGroupRollingUpdate” for now.
                    enum:
                    - ServingGroupRollingUpdate
                    type: string
                required:
                - type
                type: object
              schedulerName:
                default: volcano
                description: SchedulerName defines the name of the scheduler used
                  by ModelServing
                type: string
              template:
                description: Template defines the template for ServingGroup
                properties:
                  gangPolicy:
                    description: GangPolicy defines the gang scheduler config.
                    properties:
                      minRoleReplicas:
                        additionalProperties:
                          format: int32
                          type: integer
                        description: |-
                          MinRoleReplicas defines the minimum number of replicas required for each role
                          in gang scheduling, pods in each role are strictly gang required.
                          This map allows users to specify different minimum replica requirements for different roles.
                          If this field is not set, all roles in the ServingGroup are considered gang required by default.
                          For example if you specify a 2P(prefill) 4D(decode) serving group and set the below gangPolicy:
                          ```yaml
                          gangPolicy:
                            minRoleReplicas:
                              prefill: 1
                              decode: 1
                          ```
                          It will result in the following behavior:
                          At least one prefill and one decode must be scheduled before any of the pods in the serving group can run.
                          And pods within a role must be scheduled together.
                        type: object
                        x-kubernetes-validations:
                        - message: minRoleReplicas is immutable
                          rule: self == oldSelf
                    type: object
                  networkTopology:
                    description: |-
                      NetworkTopology defines the network topology affinity scheduling policy for the roles of the `ServingGroup`,
                      it works only when the scheduler supports network topology-aware scheduling.
                    properties:
                      groupPolicy:
                        description: GroupPolicy defines the network topology scheduling
                          requirement of  all the instances within the `ServingGroup`.
                        properties:
                          highestTierAllowed:
                            description: HighestTierAllowed specifies the highest
                              tier that a job allowed to cross when scheduling.
                            minimum: 0
                            type: integer
                          highestTierName:
                            description: |-
                              HighestTierName specifies the highest tier name that a job allowed to cross when scheduling.
                              HighestTierName and HighestTierAllowed cannot be set simultaneously.
                            maxLength: 253
                            type: string
                          mode:
                            default: hard
                            description: Mode specifies the mode of the network topology
                              constrain.
                            enum:
                            - hard
                            - soft
                            type: string
                        type: object
                      rolePolicy:
                        description: RolePolicy defines the fine-grained network topology
                          scheduling requirement for instances of a `role`.
                        properties:
                          highestTierAllowed:
                            description: HighestTierAllowed specifies the highest
                              tier that a job allowed to cross when scheduling.
                            minimum: 0
                            type: integer
                          highestTierName:
                            description: |-
                              HighestTierName specifies the highest tier name that a job allowed to cross when scheduling.
                              HighestTierName and HighestTierAllowed cannot be set simultaneously.
                            maxLength: 253
                            type: string
                          mode:
                            default: hard
                            description: Mode specifies the mode of the network topology
                              constrain.
                            enum:
                            - hard
                            - soft
                            type: string
                        type: object
                    type: object
                  restartGracePeriodSeconds:
                    default: 0
                    description: |-
                      RestartGracePeriodSeconds defines the grace time for the controller to rebuild the ServingGroup when an error occurs
                      Defaults to 0 (ServingGroup will be rebuilt immediately after an error)
                    format: int64
                    type: integer
                  roles:
                    items:
                      description: Role defines the specific pod instance role that
                        performs the inference task.
                      properties:
                        entryTemplate:
                          description: |-
                            EntryTemplate defines the template for the entry pod of a role.
                            Required: Currently, a role must have only one entry-pod.
                          properties:
                            metadata:
                              description: Object's metadata.
                              properties:
