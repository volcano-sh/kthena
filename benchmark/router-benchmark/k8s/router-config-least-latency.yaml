# Router scheduler config — Least Latency
apiVersion: v1
kind: ConfigMap
metadata:
  name: kthena-router-config
  namespace: kthena-system
data:
  routerConfiguration: |
    scheduler:
      pluginConfig:
        - name: least-latency
          args:
            TTFTTPOTWeightFactor: 0.5
      plugins:
        Filter:
          enabled: []
          disabled:
            - least-request
            - lora-affinity
        Score:
          enabled:
            - name: least-latency
              weight: 1
