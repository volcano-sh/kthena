# Dynamo Mocker Deployment
# For environments with poor network, localhost HF hubs are used
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mocker-llm
  namespace: default
  labels:
    app: mocker-llm
    component: mock-backend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: mocker-llm
  template:
    metadata:
      labels:
        app: mocker-llm
        component: mock-backend
    spec:
      containers:
      - name: mocker
        image: ghcr.io/stleox/dynamo-mocker-sglang:v2026-04-23
        imagePullPolicy: IfNotPresent
        env:
        - name: MOCKER_MODELS
          value: "Qwen/Qwen3-0.6B"
        - name: MOCKER_ENGINE_TYPE
          value: "sglang"
        - name: HF_HOME
          value: "/root/.cache/huggingface"
        - name: HF_HUB_OFFLINE
          value: "1"
        ports:
        - containerPort: 30000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 30000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v1/models
            port: 30000
          initialDelaySeconds: 15
          periodSeconds: 15
        volumeMounts:
        - name: huggingface-cache
          mountPath: /root/.cache/huggingface/hub
          readOnly: true
      volumes:
      - name: huggingface-cache
        hostPath:
          path: /root/.cache/huggingface/hub
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: mocker-llm
  namespace: default
  labels:
    app: mocker-llm
spec:
  selector:
    app: mocker-llm
  ports:
  - name: http
    port: 30000
    targetPort: 30000
    protocol: TCP
  type: ClusterIP
