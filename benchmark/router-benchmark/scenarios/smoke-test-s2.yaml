name: "smoke-test-s2-latency-vs-qps"
description: "s2 scenario: routing latency under different QPS"

load:
  schedule:
    mode: "rate"
    rate: 50
  traffic:
    burstiness: 1.0
    ramp:
      strategy: "none"
  concurrency:
    connections: 100
  prompts:
    - tokens: 512
      weight: 10
  max_tokens:
    - tokens: 128
      weight: 10
  duration: "60s"

backends:
  common:
    engineType: "sglang"
    model: "Qwen/Qwen3-0.6B"
  profiles:
    - name: "homogeneous"
      count: 4

metrics:
  prometheus: true
  pprof: false
#  cpuProfileSeconds: 15
#  profiles:
#    - heap
#    - goroutine
#    - allocs
#    - mutex

aiperf:
  extraArgs:
    - "--tokenizer"
    - "Qwen/Qwen3-0.6B"
