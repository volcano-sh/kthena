# Router scheduler config — Random
apiVersion: v1
kind: ConfigMap
metadata:
  name: kthena-router-config
  namespace: kthena-system
data:
  routerConfiguration: |
    scheduler:
      plugins:
        Filter:
          enabled: []
          disabled:
            - least-request
            - lora-affinity
        Score:
          enabled:
            - name: random
              weight: 1
