apiVersion: v1
kind: Secret
metadata:
  name: openai-api-key
  namespace: default
type: Opaque
stringData:
  api-key: "replace-with-your-openai-api-key"
---
apiVersion: networking.serving.volcano.sh/v1alpha1
kind: ExternalModelProvider
metadata:
  name: openai-provider
  namespace: default
spec:
  providerType: OpenAI
  baseURL: "https://api.openai.com"
  model: "gpt-4o-mini"
  auth:
    secretRef:
      name: openai-api-key
      key: api-key
---
apiVersion: networking.serving.volcano.sh/v1alpha1
kind: ModelRoute
metadata:
  name: openai-external-route
  namespace: default
spec:
  modelName: "openai-chat"
  rules:
  - name: "default"
    targetModels:
    - externalModelProviderName: "openai-provider"
