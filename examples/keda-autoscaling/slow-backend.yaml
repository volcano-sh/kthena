apiVersion: v1
kind: ConfigMap
metadata:
  name: slow-backend-script
  namespace: default
data:
  server.py: |
    import time, json
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    class H(BaseHTTPRequestHandler):
        def do_POST(self):
            time.sleep(3)
            body = json.dumps({
                "id": "cmpl-1", "object": "text_completion", "model": "test",
                "choices": [{"text": "ok", "index": 0, "finish_reason": "stop"}]
            }).encode()
            self.send_response(200)
            self.send_header("content-type", "application/json")
            self.send_header("content-length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)
        def log_message(self, *a, **k): pass
    ThreadingHTTPServer(("", 8080), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-backend
  namespace: default
  labels:
    app: slow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slow-backend
  template:
    metadata:
      labels:
        app: slow-backend
    spec:
      containers:
      - name: server
        image: python:3-alpine
        command: ["python3", "/app/server.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: script
          mountPath: /app
      volumes:
      - name: script
        configMap:
          name: slow-backend-script
---
apiVersion: v1
kind: Service
metadata:
  name: slow-backend
  namespace: default
spec:
  selector:
    app: slow-backend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
