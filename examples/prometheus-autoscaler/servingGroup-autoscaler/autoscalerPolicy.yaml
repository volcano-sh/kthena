apiVersion: workload.serving.volcano.sh/v1alpha1
kind: AutoscalingPolicy
metadata:
  name: podinfo-prom-policy
  namespace: autoscale-demo
spec:
  tolerancePercent: 10
  metrics:
    - name: podinfo_rps
      targetValue: "0.5"
  behavior:
    scaleDown:
      period: 15s
      stabilizationWindow: 30s
      instances: 1
      percent: 100
      selectPolicy: Or
    scaleUp:
      stablePolicy:
        period: 15s
        stabilizationWindow: 0s
        instances: 2
        percent: 100
        selectPolicy: Or
      panicPolicy:
        period: 5s
        percent: 200
        panicThresholdPercent: 200
        panicModeHold: 30s
  homogeneousTarget:
    minReplicas: 1
    maxReplicas: 6
    target:
      targetRef:
        kind: ModelServing
        name: podinfo-ms
      metricSources:
        podinfo_rps:
          prometheus:
            serverURL: http://kube-prometheus-stack-prometheus.test.svc.cluster.local:9090
            # Scope the query to this ModelServing's pods only. The ServiceMonitor
            # selects the "podinfo" Service, so Prometheus tags every scraped
            # series with service="podinfo". Filtering by namespace alone would
            # also sum http_requests_total from unrelated pods in the namespace
            # and skew the scaling signal.
            query: sum(rate(http_requests_total{namespace="autoscale-demo", service="podinfo"}[2m]))
