apiVersion: workload.serving.volcano.sh/v1alpha1
kind: AutoscalingPolicyBinding
metadata:
  name: podinfo-prom-binding
  namespace: autoscale-demo
spec:
  policyRef:
    name: podinfo-prom-policy
  homogeneousTarget:
    minReplicas: 1
    maxReplicas: 6
    target:
      targetRef:
        kind: ModelServing
        name: podinfo-ms
      metricSources:
        podinfo_rps:
          type: Prometheus
          prometheus:
            serverURL: http://kube-prometheus-stack-prometheus.test.svc.cluster.local:9090
            # Scope the query to this ModelServing's pods only. The pod label
            # "modelserving.volcano.sh/name=podinfo-ms" is exposed onto the
            # metric series via the ServiceMonitor's podTargetLabels. Prometheus
            # sanitizes label names, so dots/slashes become underscores:
            # modelserving.volcano.sh/name -> modelserving_volcano_sh_name.
            # Filtering by namespace alone would also sum http_requests_total
            # from unrelated pods in the namespace and skew the scaling signal.
            query: sum(rate(http_requests_total{namespace="autoscale-demo", modelserving_volcano_sh_name="podinfo-ms"}[2m]))
