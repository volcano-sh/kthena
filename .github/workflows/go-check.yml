name: Go Check

on:
  pull_request:
    branches:
      - main
      - "release-*"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Check Go check related changes
    runs-on: ubuntu-latest
    outputs:
      go_check: ${{ steps.filter.outputs.go_check }}
    steps:
      - name: Check Go check related changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          predicate-quantifier: every
          filters: |
            go_check:
              - "**"
              - "!**.md"
              - "!**.svg"
              - "!**.png"
              - "!docs/**"
              - "!.github/**"

      - name: Skip Go check
        if: steps.filter.outputs.go_check != 'true'
        run: echo "No Go check-related files changed; marking required check as passed."

  build:
    needs: changes
    if: needs.changes.outputs.go_check == 'true'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: install helm
        shell: bash
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: helm lint
        shell: bash
        run: |
          helm lint charts/kthena
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Build Kthena
        shell: bash
        run: |
          make gen-check
      - name: golangci-lint
        shell: bash
        run: |
          make lint
