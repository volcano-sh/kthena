name: Python Lint

on:
  pull_request:
    branches:
      - main
      - "release-*"

permissions:
  contents: read
  pull-requests: read

jobs:
  python_lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check Python lint related changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - "python/**"
              - "**.py"
              - "python/kthena/pyproject.toml"
              - ".github/workflows/python-lint.yml"

      - name: Skip Python lint
        if: steps.filter.outputs.python != 'true'
        run: echo "No Python lint-related files changed; marking required check as passed."

      - uses: actions/checkout@v4
        if: steps.filter.outputs.python == 'true'
      - name: Set up Python
        if: steps.filter.outputs.python == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Run Lint
        if: steps.filter.outputs.python == 'true'
        run: |
          make lint-python
