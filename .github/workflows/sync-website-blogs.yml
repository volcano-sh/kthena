name: Sync Blogs to Website

on:
  push:
    branches:
      - main
    paths:
      - 'docs/kthena/blog/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kthena repo
        uses: actions/checkout@v4
        with:
          path: kthena

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: volcano-sh/website
          path: website
          # Requires a PAT to push changes and create a PR in volcano-sh/website
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install pyyaml

      - name: Run sync script
        run: |
          cd kthena
          python hack/sync-blogs-to-website.py --source docs/kthena/blog --target ../website/content/en/blog

      - name: Create Pull Request in website repo
        uses: peter-evans/create-pull-request@v6
        with:
          path: website
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          commit-message: "docs: sync kthena blogs to website"
          title: "docs: sync kthena blogs"
          body: |
            This PR automatically synchronizes the latest blog updates from the `volcano-sh/kthena` repository.
            
            Triggered by commit: https://github.com/volcano-sh/kthena/commit/${{ github.sha }}
            
            _This is an automated PR generated by a GitHub Action._
          branch: "sync-kthena-blogs"
          base: master
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          signoff: true
