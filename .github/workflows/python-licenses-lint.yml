name: Python Licenses Check

on:
  pull_request:
    branches:
      - main
      - release-*

permissions:
  contents: read
  pull-requests: read

jobs:
  python-licenses-lint:
    name: Python Licenses Lint
    timeout-minutes: 40
    runs-on: ubuntu-latest
    steps:
      - name: Check Python license related changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - "python/**"
              - "config/python-licenses-lint.ini"
              - ".github/workflows/python-licenses-lint.yml"

      - name: Skip Python Licenses Lint
        if: steps.filter.outputs.python != 'true'
        run: echo "No Python license-related files changed; marking required check as passed."

      - name: Checkout code
        if: steps.filter.outputs.python == 'true'
        uses: actions/checkout@v3
      - name: Set up Python
        if: steps.filter.outputs.python == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install liccheck
        if: steps.filter.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install liccheck
      - name: Check Runtime Requirements
        if: steps.filter.outputs.python == 'true'
        run: |
          if [ -f "python/kthena/runtime/requirements.txt" ]; then
            echo "🔍 Checking runtime requirements..."
            pip install -r python/kthena/runtime/requirements.txt
            liccheck -s config/python-licenses-lint.ini -r python/kthena/runtime/requirements.txt
            echo "✅ Runtime requirements check completed"
          else
            echo "⚠️  Runtime requirements file not found, skipping..."
          fi
      - name: Check Downloader Requirements
        if: steps.filter.outputs.python == 'true'
        run: |
          if [ -f "python/kthena/downloader/requirements.txt" ]; then
            echo "🔍 Checking downloader requirements..."
            pip install -r python/kthena/downloader/requirements.txt
            liccheck -s config/python-licenses-lint.ini -r python/kthena/downloader/requirements.txt
            echo "✅ Downloader requirements check completed"
          else
            echo "⚠️  Downloader requirements file not found, skipping..."
          fi
