name: Python Test

on:
  pull_request:
    branches:
      - main
      - "release-*"

permissions:
  contents: read
  pull-requests: read

jobs:
  python_unit_test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Check Python test related changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - "python/**"
              - "**.py"
              - ".github/workflows/python-tests.yml"

      - name: Skip Python tests
        if: steps.filter.outputs.python != 'true'
        run: echo "No Python test-related files changed; marking required check as passed."

      - uses: actions/checkout@v4
        if: steps.filter.outputs.python == 'true'
      - name: Set up Python
        if: steps.filter.outputs.python == 'true'
        uses: actions/setup-python@v4.0.0
        with:
          python-version: "3.10"
      - name: Install dependencies
        if: steps.filter.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r python/kthena/downloader/requirements.txt
          pip install -r python/kthena/runtime/requirements.txt
          pip install -r python/kthena/runtime/requirements-dev.txt
      - name: Run tests
        if: steps.filter.outputs.python == 'true'
        run: |
          pip install coverage
          coverage run -m pytest
      - name: Check coverage threshold
        if: steps.filter.outputs.python == 'true'
        run: |
          coverage report --fail-under=60 # Set coverage threshold
