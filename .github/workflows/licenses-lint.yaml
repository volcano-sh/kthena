name: Licenses Lint

on:
  pull_request:
    branches:
      - main
      - release-*

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Check license lint related changes
    runs-on: ubuntu-latest
    outputs:
      licenses: ${{ steps.filter.outputs.licenses }}
    steps:
      - name: Check license lint related changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          predicate-quantifier: every
          filters: |
            licenses:
              - "**"
              - "!docs/**"
              - "!LICENSE"
              - "!OWNERS"
              - "!*.md"
              - "!python/**"

      - name: Skip Licenses Lint
        if: steps.filter.outputs.licenses != 'true'
        run: echo "No license lint-related files changed; marking required check as passed."

  licenses-lint:
    name: Licenses Lint
    needs: changes
    if: needs.changes.outputs.licenses == 'true'
    timeout-minutes: 40
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: generate license mirror
        run: |
          make licenses-check
      - name: lint-licenses
        # if restricted > 0, CI will report an error.
        run: |
          make lint-licenses
