---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: modelservers.networking.serving.volcano.sh
spec:
  group: networking.serving.volcano.sh
  names:
    kind: ModelServer
    listKind: ModelServerList
    plural: modelservers
    singular: modelserver
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModelServer is the Schema for the modelservers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ModelServerSpec defines the desired state of ModelServer.
            properties:
              externalProvider:
                description: |-
                  ExternalProvider specifies an external cloud LLM provider to route requests to.
                  When this is set, WorkloadSelector is ignored and requests are proxied to the external endpoint.
                properties:
                  credentialsRef:
                    description: |-
                      Reference to a Kubernetes Secret containing the API credentials/keys for the external provider.
                      The Secret should contain the token/key under the expected key name (e.g., 'api-key' or 'token').
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  endpoint:
                    description: The full base URL for the external provider endpoint
                      (e.g., https://api.openai.com/v1).
                    format: uri
                    type: string
                  providerType:
                    description: The type of the external provider (e.g., OpenAI,
                      Anthropic, Custom).
                    enum:
                    - OpenAI
                    - Anthropic
                    - AzureOpenAI
                    - AWSBedrock
                    - Custom
                    type: string
                required:
                - endpoint
                - providerType
                type: object
                x-kubernetes-validations:
                - message: endpoint must be an https URL for known provider types
                  rule: self.providerType == 'Custom' || self.endpoint.startsWith('https://')
              inferenceEngine:
                description: The inference engine used to serve the model.
                enum:
                - vLLM
                - SGLang
                type: string
              kvConnector:
                description: KVConnector specifies the KV connector configuration
                  for PD disaggregated routing
                properties:
                  type:
                    default: http
                    description: |-
                      Type specifies the connector type.
                      If you do not know which type to use, please use "http" as default.
                    enum:
                    - http
                    - lmcache
                    - nixl
                    - mooncake
                    type: string
                type: object
              model:
                description: |-
                  The real model that the modelServers are running.
                  If the `model` in LLM inference request is different from this field, it should be overwritten by this field.
                  Otherwise, the `model` in LLM inference request will not be mutated.
                maxLength: 256
                type: string
              trafficPolicy:
                description: Traffic Policy for accessing the model server instance.
                properties:
                  retry:
                    description: The retry policy for the inference request.
                    properties:
                      attempts:
                        description: |-
                          The maximum number of times an individual inference request to a model server should be retried.
                          If the maximum number of retries has been done without a successgful response, the request will be considered failed.
                        format: int32
                        type: integer
                      retryInterval:
                        default: 100ms
                        description: RetryInterval is the interval between retries.
                        type: string
                    type: object
                  timeout:
                    description: |-
                      The request timeout for the inference request.
                      By default, there is no timeout.
                    type: string
                type: object
              workloadPort:
                description: WorkloadPort defines the port and protocol configuration
                  for the model server.
                properties:
                  port:
                    description: The port of the model server. The number must be
                      between 1 and 65535.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  protocol:
                    default: http
                    description: The protocol of the model server. Supported values
                      are "http" and "https".
                    enum:
                    - http
                    - https
                    type: string
                required:
                - port
                type: object
              workloadSelector:
                description: |-
                  WorkloadSelector is used to match the model serving instances.
                  Currently, they must be pods within the same namespace as modelServer object.
                properties:
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      The base labels to match the model serving instances.
                      All serving instances must match these labels.
                    type: object
                  pdGroup:
                    description: |-
                      PDGroup is used to further match different roles of the model serving instances,
                      mainly used in case like PD disaggregation.
                    properties:
                      decodeLabels:
                        additionalProperties:
                          type: string
                        description: The labels to match the model serving instances
                          for decode.
                        type: object
                      groupKey:
                        description: |-
                          GroupKey is the key to distinguish different PD groups.
                          Only PD instances with the same group key and value could be paired.
                        type: string
                      prefillLabels:
                        additionalProperties:
                          type: string
                        description: The labels to match the model serving instances
                          for prefill.
                        type: object
                    required:
                    - decodeLabels
                    - groupKey
                    - prefillLabels
                    type: object
                type: object
            type: object
            x-kubernetes-validations:
            - message: exactly one of workloadSelector or externalProvider must be
                specified
              rule: has(self.workloadSelector) != has(self.externalProvider)
            - message: inferenceEngine must be specified when workloadSelector is
                set
              rule: 'has(self.workloadSelector) ? has(self.inferenceEngine) : true'
          status:
            description: ModelServerStatus defines the observed state of ModelServer.
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
