---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: modelservers.networking.serving.volcano.sh
spec:
  group: networking.serving.volcano.sh
  names:
    kind: ModelServer
    listKind: ModelServerList
    plural: modelservers
    singular: modelserver
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModelServer is the Schema for the modelservers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ModelServerSpec defines the desired state of ModelServer.
            properties:
              inferenceEngine:
                description: The inference engine used to serve the model.
                enum:
                - vLLM
                - SGLang
                type: string
              kvConnector:
                description: KVConnector specifies the KV connector configuration
                  for PD disaggregated routing
                properties:
                  type:
                    default: http
                    description: |-
                      Type specifies the connector type.
                      If you do not know which type to use, please use "http" as default.
                    enum:
                    - http
                    - lmcache
                    - nixl
                    - mooncake
                    type: string
                type: object
              model:
                description: |-
                  The real model that the modelServers are running.
                  If the `model` in LLM inference request is different from this field, it should be overwritten by this field.
                  Otherwise, the `model` in LLM inference request will not be mutated.
                maxLength: 256
                type: string
              trafficPolicy:
                description: Traffic Policy for accessing the model server instance.
                properties:
                  retry:
                    description: The retry policy for the inference request.
                    properties:
                      attempts:
                        description: |-
                          The maximum number of times an individual inference request to a model server should be retried.
                          If the maximum number of retries has been done without a successgful response, the request will be considered failed.
                        format: int32
                        type: integer
                      retryInterval:
                        default: 100ms
                        description: RetryInterval is the interval between retries.
                        type: string
                    type: object
                  timeout:
                    description: |-
                      The request timeout for the inference request.
                      By default, there is no timeout.
                    type: string
                type: object
              workloadPort:
                description: WorkloadPort defines the port and protocol configuration
                  for the model server.
                properties:
                  port:
                    description: The port of the model server. The number must be
                      between 1 and 65535.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  protocol:
                    default: http
                    description: The protocol of the model server. Supported values
                      are "http" and "https".
                    enum:
                    - http
                    - https
                    type: string
                required:
                - port
                type: object
              workloadSelector:
                description: |-
                  WorkloadSelector is used to match the model serving instances.
                  Currently, they must be pods within the same namespace as modelServer object.
                properties:
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      The base labels to match the model serving instances.
                      All serving instances must match these labels.
                    type: object
                  pdGroup:
                    description: |-
                      PDGroup is used to further match different roles of the model serving instances,
                      mainly used in case like PD disaggregation.
                    properties:
                      decodeLabels:
                        additionalProperties:
                          type: string
                        description: The labels to match the model serving instances
                          for decode.
                        type: object
                      groupKey:
                        description: |-
                          GroupKey is the key to distinguish different PD groups.
                          Only PD instances with the same group key and value could be paired.
                        type: string
                      prefillLabels:
                        additionalProperties:
                          type: string
                        description: The labels to match the model serving instances
                          for prefill.
                        type: object
                    required:
                    - decodeLabels
                    - groupKey
                    - prefillLabels
                    type: object
                type: object
            required:
            - inferenceEngine
            - workloadSelector
            type: object
          status:
            description: ModelServerStatus defines the observed state of ModelServer.
            properties:
              conditions:
                description: |-
                  Conditions track the lifecycle of this ModelServer.
                  Types:
                    - "Ready": true when at least one ready pod is matched and the ModelServer has been
                      registered with the router store. Signals that the ModelServer can serve traffic.
                    - "AllPodsReady": true when at least one pod is matched and every matched pod is ready
                      and registered with the router store.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              matchedReplicas:
                description: |-
                  matchedReplicas is the total number of pods (ready or not) that match the
                  workloadSelector.
                format: int32
                type: integer
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  for this ModelServer.
                format: int64
                type: integer
              readyReplicas:
                description: |-
                  readyReplicas is the number of ready pods that are currently matched by the
                  workloadSelector and have been successfully registered in the router's store.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
