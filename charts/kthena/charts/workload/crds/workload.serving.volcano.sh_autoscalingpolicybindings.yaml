              AutoscalingPolicyBinding.\n\nExactly one of HeterogeneousTarget or HomogeneousTarget
              must be set:\n  - HomogeneousTarget   -> scale a single ModelServing
              by metric targets.\n  - HeterogeneousTarget -> optimize replica distribution
              across several\n    ModelServing groups with different hardware/cost.\n\nExample
              (homogeneous, metric-based scaling):\n\n\tspec:\n\t  policyRef:\n\t
              \   name: podinfo-prom-policy\n\t  homogeneousTarget:\n\t    minReplicas:
              1\n\t    maxReplicas: 6\n\t    target:\n\t      targetRef:\n\t        kind:
              ModelServing\n\t        name: podinfo-ms\n\t      metricSources:\n\t
              \       podinfo_rps:\n\t          type: Prometheus\n\t          prometheus:\n\t
              \           serverURL: http://prometheus.monitoring.svc:9090\n\t            query:
              sum(rate(http_requests_total[2m]))"
